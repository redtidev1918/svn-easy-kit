name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - run: go test ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
      - name: Cross compile
        shell: bash
        run: |
          set -euo pipefail
          for target in windows/amd64 linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*}
            arch=${target#*/}
            ext=
            if [ "$os" = windows ]; then ext=.exe; fi
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" \
              -o "SvnEasyClient-${os}-${arch}${ext}" ./cmd/svneasy-client
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" \
              -o "SvnEasyServer-${os}-${arch}${ext}" ./cmd/svneasy-server
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: SvnEasy*
